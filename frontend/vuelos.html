<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuelos — AeroGest</title>
  <meta name="description" content="Gestiona vuelos del aeropuerto: crea, edita y monitorea el estado de cada vuelo en tiempo real." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    @keyframes slide-in { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fade-in  { from { opacity:0; } to { opacity:1; } }
    .animate-slide-in { animation: slide-in 0.35s ease-out both; }
    .animate-fade-in  { animation: fade-in  0.3s ease-out both; }
    .sidebar-link.active { background:rgba(56,189,248,0.12); color:#38bdf8; border-left:3px solid #38bdf8; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#0f172a; } ::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
    .modal-overlay { backdrop-filter:blur(4px); }
    tr { transition: background .15s; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="w-64 min-h-screen bg-slate-900 border-r border-slate-800 flex flex-col fixed left-0 top-0 z-30">
    <div class="px-6 py-5 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-sky-500/30">✈️</div>
        <div><h1 class="text-white font-bold text-lg leading-none">AeroGest</h1><p class="text-slate-400 text-xs">Gestión de Vuelos</p></div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="index.html"     class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 transition-all hover:bg-slate-800 hover:text-slate-100"><span class="text-lg">🏠</span> Dashboard</a>
      <a href="vuelos.html"    class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all hover:bg-slate-800"><span class="text-lg">🛫</span> Vuelos</a>
      <a href="pasajeros.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 transition-all hover:bg-slate-800 hover:text-slate-100"><span class="text-lg">👥</span> Pasajeros</a>
      <a href="reservas.html"  class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 transition-all hover:bg-slate-800 hover:text-slate-100"><span class="text-lg">🎫</span> Reservas</a>
    </nav>
    <div class="px-4 py-4 border-t border-slate-800">
      <div id="api-status" class="flex items-center gap-2 text-xs text-slate-400">
        <span class="w-2 h-2 bg-slate-600 rounded-full animate-pulse"></span> Conectando...
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="ml-64 flex-1 p-8">
    <div class="mb-6 flex items-center justify-between animate-fade-in">
      <div>
        <h2 class="text-3xl font-bold text-white">Gestión de <span class="text-sky-400">Vuelos</span></h2>
        <p class="text-slate-400 text-sm mt-1">Administra todos los vuelos del aeropuerto</p>
      </div>
      <button id="btn-nuevo-vuelo" onclick="abrirModal()"
        class="flex items-center gap-2 bg-sky-500 hover:bg-sky-400 text-white font-semibold px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-sky-500/25 hover:shadow-sky-500/40 active:scale-95">
        <span class="text-lg">+</span> Nuevo Vuelo
      </button>
    </div>

    <!-- Filtros -->
    <div class="flex flex-wrap gap-3 mb-6 animate-slide-in">
      <button onclick="filtrarEstado('')"       class="filtro-btn active-filter px-4 py-2 rounded-xl text-sm font-medium bg-sky-500/20 text-sky-300 border border-sky-500/30 hover:bg-sky-500/30 transition-all" data-estado="">Todos</button>
      <button onclick="filtrarEstado('programado')"  class="filtro-btn px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all" data-estado="programado">🕐 Programados</button>
      <button onclick="filtrarEstado('embarcando')"  class="filtro-btn px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all" data-estado="embarcando">🚪 Embarcando</button>
      <button onclick="filtrarEstado('en_vuelo')"    class="filtro-btn px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all" data-estado="en_vuelo">🌐 En Vuelo</button>
      <button onclick="filtrarEstado('aterrizado')"  class="filtro-btn px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all" data-estado="aterrizado">🛬 Aterrizado</button>
      <button onclick="filtrarEstado('cancelado')"   class="filtro-btn px-4 py-2 rounded-xl text-sm font-medium bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all" data-estado="cancelado">❌ Cancelado</button>
    </div>

    <!-- Tabla -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden animate-slide-in" style="animation-delay:.1s">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-800 text-slate-500 text-xs uppercase tracking-wide">
              <th class="px-6 py-4 text-left">Vuelo</th>
              <th class="px-6 py-4 text-left">Aerolínea</th>
              <th class="px-6 py-4 text-left">Origen → Destino</th>
              <th class="px-6 py-4 text-left">Salida</th>
              <th class="px-6 py-4 text-left">Llegada</th>
              <th class="px-6 py-4 text-left">Terminal/Puerta</th>
              <th class="px-6 py-4 text-left">Asientos</th>
              <th class="px-6 py-4 text-left">Estado</th>
              <th class="px-6 py-4 text-right">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-vuelos">
            <tr><td colspan="9" class="px-6 py-12 text-center text-slate-500">
              <div class="flex flex-col items-center gap-3">
                <div class="w-10 h-10 border-3 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                Cargando vuelos...
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
      <div id="tabla-footer" class="px-6 py-3 border-t border-slate-800 text-slate-500 text-xs"></div>
    </div>
  </main>

  <!-- ═══ MODAL CREAR/EDITAR ═══ -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-overlay bg-slate-950/80 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-2xl shadow-2xl animate-slide-in">
      <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
        <h3 id="modal-title" class="text-lg font-semibold text-white">Nuevo Vuelo</h3>
        <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <form id="form-vuelo" class="p-6 grid grid-cols-2 gap-4">
        <input type="hidden" id="vuelo-id" />
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Número de Vuelo *</label>
          <input id="f-numero" type="text" placeholder="AV123" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Aerolínea *</label>
          <input id="f-aerolinea" type="text" placeholder="Avianca" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Origen *</label>
          <input id="f-origen" type="text" placeholder="Bogotá (BOG)" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Destino *</label>
          <input id="f-destino" type="text" placeholder="Medellín (MDE)" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Fecha y Hora Salida *</label>
          <input id="f-salida" type="datetime-local" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Fecha y Hora Llegada *</label>
          <input id="f-llegada" type="datetime-local" required
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Capacidad (asientos)</label>
          <input id="f-capacidad" type="number" min="1" max="800" placeholder="150"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Estado</label>
          <select id="f-estado"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all">
            <option value="programado">Programado</option>
            <option value="embarcando">Embarcando</option>
            <option value="en_vuelo">En Vuelo</option>
            <option value="aterrizado">Aterrizado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Terminal</label>
          <input id="f-terminal" type="text" placeholder="T1"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
        <div>
          <label class="block text-slate-400 text-xs mb-1.5 font-medium">Puerta</label>
          <input id="f-puerta" type="text" placeholder="G12"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
        </div>
      </form>
      <div class="px-6 pb-6 flex items-center justify-end gap-3">
        <button onclick="cerrarModal()" class="px-5 py-2.5 rounded-xl text-slate-400 hover:text-white text-sm font-medium transition-all hover:bg-slate-800">Cancelar</button>
        <button onclick="guardarVuelo()" class="px-6 py-2.5 rounded-xl bg-sky-500 hover:bg-sky-400 text-white text-sm font-semibold transition-all shadow-lg shadow-sky-500/25 active:scale-95">
          💾 Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Loader -->
  <div id="global-loader" class="hidden fixed inset-0 bg-slate-950/70 z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-slate-300 text-sm">Guardando...</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/vuelos.js"></script>
</body>
</html>
