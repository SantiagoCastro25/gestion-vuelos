<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vuelos — AeroGest</title>
  <meta name="description" content="Gestiona vuelos del aeropuerto: crea, edita y monitorea el estado de cada vuelo en tiempo real." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body class="text-zinc-900 flex flex-col">

  <!-- Top Navigation (Pill) -->
  <nav class="top-nav fade-up" style="animation-delay: 0.1s;">
    <div class="flex items-center gap-3">
      <div style="width:36px;height:36px;background:#0f172a;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <span style="font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-0.03em;">AeroGest</span>
    </div>
    
    <div class="nav-links">
      <a href="index.html"     class="nav-link">Resumen</a>
      <a href="vuelos.html"    class="nav-link active">Vuelos</a>
      <a href="pasajeros.html" class="nav-link">Pasajeros</a>
      <a href="reservas.html"  class="nav-link">Reservas</a>
    </div>

    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" style="background:#f1f5f9;border:1px solid #e2e8f0;">
      <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#94a3b8;display:inline-block;flex-shrink:0;box-shadow:0 0 0 2px rgba(148,163,184,0.2);"></span>
      <span id="status-text" style="font-size:12px;font-weight:600;color:#64748b;">Conectando...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="flex items-center justify-between mb-2 fade-up" style="animation-delay:.15s;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;color:#0f172a;letter-spacing:-0.03em;">Directorio de Vuelos</h1>
        <p style="font-size:14px;color:#64748b;margin-top:2px;">Administra todos los vuelos del aeropuerto</p>
      </div>
      <button class="btn-primary" onclick="abrirModal()" id="btn-nuevo-vuelo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo Vuelo
      </button>
    </div>

    <!-- Filter tabs (scrollable on mobile) -->
    <div class="fade-up mb-5" style="animation-delay:.1s;overflow-x:auto;white-space:nowrap;padding-bottom:4px;">
      <button class="filter-tab active" onclick="filtrarEstado('')"          data-estado="">Todos</button>
      <button class="filter-tab"        onclick="filtrarEstado('programado')" data-estado="programado">Programado</button>
      <button class="filter-tab"        onclick="filtrarEstado('embarcando')" data-estado="embarcando">Embarcando</button>
      <button class="filter-tab"        onclick="filtrarEstado('en_vuelo')"   data-estado="en_vuelo">En Vuelo</button>
      <button class="filter-tab"        onclick="filtrarEstado('aterrizado')" data-estado="aterrizado">Aterrizado</button>
      <button class="filter-tab"        onclick="filtrarEstado('cancelado')"  data-estado="cancelado">Cancelado</button>
    </div>

    <div class="card-container fade-up" style="animation-delay:.15s;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="w-full data-table" style="min-width:700px;">
          <thead><tr>
            <th>Vuelo</th><th>Aerolínea</th><th>Origen → Destino</th><th>Salida</th><th>Llegada</th><th>T / Puerta</th><th>Asientos</th><th>Estado</th><th style="text-align:right;">Acciones</th>
          </tr></thead>
          <tbody id="tabla-vuelos">
            <tr><td colspan="9" style="text-align:center;color:#a1a1aa;padding:48px 0;">Cargando vuelos...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="tabla-footer" style="padding:10px 16px;border-top:1px solid #e4e4e7;font-size:11px;color:#a1a1aa;background:#fafafa;"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">
    <div class="modal-box fade-up" style="max-width:600px;background:#ffffff;">
      <div style="padding:18px 22px;border-bottom:1px solid #f4f4f5;display:flex;align-items:center;justify-content:space-between;">
        <p style="font-size:14px;font-weight:600;color:#18181b;" id="modal-title">Nuevo Vuelo</p>
        <button onclick="cerrarModal()" class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="form-vuelo" style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <input type="hidden" id="vuelo-id" />
        <div><label class="lbl">Número de Vuelo *</label><input id="f-numero" type="text" placeholder="AV123" required class="field" /></div>
        <div><label class="lbl">Aerolínea *</label><input id="f-aerolinea" type="text" placeholder="Avianca" required class="field" /></div>
        <div><label class="lbl">Origen *</label><input id="f-origen" type="text" placeholder="Bogotá (BOG)" required class="field" /></div>
        <div><label class="lbl">Destino *</label><input id="f-destino" type="text" placeholder="Medellín (MDE)" required class="field" /></div>
        <div><label class="lbl">Fecha y Hora Salida *</label><input id="f-salida" type="datetime-local" required class="field" /></div>
        <div><label class="lbl">Fecha y Hora Llegada *</label><input id="f-llegada" type="datetime-local" required class="field" /></div>
        <div><label class="lbl">Capacidad</label><input id="f-capacidad" type="number" min="1" max="800" placeholder="150" class="field" /></div>
        <div><label class="lbl">Estado</label>
          <select id="f-estado" class="field">
            <option value="programado">Programado</option><option value="embarcando">Embarcando</option>
            <option value="en_vuelo">En Vuelo</option><option value="aterrizado">Aterrizado</option><option value="cancelado">Cancelado</option>
          </select>
        </div>
        <div><label class="lbl">Terminal</label><input id="f-terminal" type="text" placeholder="T1" class="field" /></div>
        <div><label class="lbl">Puerta</label><input id="f-puerta" type="text" placeholder="G12" class="field" /></div>
      </form>
      <div style="padding:0 22px 20px;display:flex;align-items:center;justify-content:flex-end;gap:10px;">
        <button onclick="cerrarModal()" class="btn-cancel-text">Cancelar</button>
        <button onclick="guardarVuelo()" class="btn-save">Guardar</button>
      </div>
    </div>
  </div>

  <div id="global-loader" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(255,255,255,.8);backdrop-filter:blur(4px);">
    <div style="width:32px;height:32px;border:2px solid #e4e4e7;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;"></div>
  </div>

  <script>
    // Scripts dependientes del DOM se inicializan desde vuelos.js
  </script>
  <script src="js/api.js"></script>
  <script src="js/vuelos.js"></script>
</body>
</html>
