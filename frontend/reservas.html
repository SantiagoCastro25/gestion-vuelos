<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas — AeroGest</title>
  <meta name="description" content="Gestiona las reservas de vuelos: crea, cancela y consulta reservas por vuelo o pasajero." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body class="text-zinc-900 flex flex-col">

  <!-- Top Navigation (Pill) -->
  <nav class="top-nav fade-up" style="animation-delay: 0.1s;">
    <div class="flex items-center gap-3">
      <div style="width:36px;height:36px;background:#0f172a;border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </div>
      <span style="font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-0.03em;">AeroGest</span>
    </div>
    
    <div class="nav-links">
      <a href="index.html"     class="nav-link">Resumen</a>
      <a href="vuelos.html"    class="nav-link">Vuelos</a>
      <a href="pasajeros.html" class="nav-link">Pasajeros</a>
      <a href="reservas.html"  class="nav-link active">Reservas</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="flex items-center justify-between mb-2 fade-up" style="animation-delay:.15s;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:24px;font-weight:800;color:#0f172a;letter-spacing:-0.03em;">Gestión de Reservas</h1>
        <p style="font-size:14px;color:#64748b;margin-top:2px;">Control de boletos y estados de pago</p>
      </div>
      <button class="btn-primary" onclick="abrirModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva Reserva
      </button>
    </div>

    <!-- Filter -->
    <div class="flex items-center gap-3 mb-5 fade-up" style="animation-delay:.1s;flex-wrap:wrap;">
      <label style="font-size:12px;color:#71717a;white-space:nowrap;font-weight:500;">Filtrar por vuelo:</label>
      <select id="filtro-vuelo" onchange="filtrarVuelo(this.value)"
        style="background:#ffffff;border:1px solid #d4d4d8;border-radius:8px;padding:7px 12px;color:#18181b;font-size:12px;outline:none;min-width:200px;cursor:pointer;transition:border-color .15s, box-shadow .15s;"
        onfocus="this.style.borderColor='#2563eb'; this.style.boxShadow='0 0 0 3px rgba(37,99,235,0.1)';" onblur="this.style.borderColor='#d4d4d8'; this.style.boxShadow='none';">
        <option value="">Todos los vuelos</option>
      </select>
      <button onclick="filtrarVuelo('')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#71717a;transition:color .15s;font-weight:500;" onmouseover="this.style.color='#18181b'" onmouseout="this.style.color='#71717a'">Limpiar</button>
    </div>

    <div class="card-container fade-up" style="animation-delay:.15s;overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="w-full data-table" style="min-width:680px;">
          <thead><tr>
            <th>#</th><th>Vuelo</th><th>Ruta</th><th>Pasajero</th><th>Asiento</th><th>Clase</th><th>Precio</th><th>Estado</th><th style="text-align:right;">Acciones</th>
          </tr></thead>
          <tbody id="tabla-reservas">
            <tr><td colspan="9" style="text-align:center;color:#a1a1aa;padding:48px 0;">Cargando reservas...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="tabla-footer" style="padding:10px 16px;border-top:1px solid #e4e4e7;font-size:11px;color:#a1a1aa;background:#fafafa;"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">
    <div class="modal-box fade-up" style="max-width:520px;background:#ffffff;">
      <div style="padding:18px 22px;border-bottom:1px solid #f4f4f5;display:flex;align-items:center;justify-content:space-between;">
        <p style="font-size:14px;font-weight:600;color:#18181b;" id="modal-title">Nueva Reserva</p>
        <button onclick="cerrarModal()" class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form style="padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div style="grid-column:span 2;"><label class="lbl">Vuelo *</label>
          <select id="f-vuelo" class="field"><option value="">— Selecciona un vuelo —</option></select>
        </div>
        <div style="grid-column:span 2;"><label class="lbl">Pasajero *</label>
          <select id="f-pasajero" class="field"><option value="">— Selecciona un pasajero —</option></select>
        </div>
        <div><label class="lbl">Asiento (ej: 12A)</label><input id="f-asiento" type="text" placeholder="12A" maxlength="5" class="field" /></div>
        <div><label class="lbl">Clase</label>
          <select id="f-clase" class="field">
            <option value="economica">Económica</option><option value="ejecutiva">Ejecutiva</option><option value="primera">Primera Clase</option>
          </select>
        </div>
        <div style="grid-column:span 2;"><label class="lbl">Precio (COP)</label><input id="f-precio" type="number" min="0" placeholder="350000" class="field" /></div>
      </form>
      <div style="padding:0 22px 20px;display:flex;align-items:center;justify-content:flex-end;gap:10px;">
        <button onclick="cerrarModal()" class="btn-cancel-text">Cancelar</button>
        <button onclick="crearReserva()" class="btn-save">Confirmar Reserva</button>
      </div>
    </div>
  </div>

  <div id="global-loader" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(255,255,255,.8);backdrop-filter:blur(4px);">
    <div style="width:32px;height:32px;border:2px solid #e4e4e7;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;"></div>
  </div>

  <script>
    // Scripts dependientes del DOM se inicializan desde reservas.js
  </script>
  <script src="js/api.js"></script>
  <script src="js/reservas.js"></script>
</body>
</html>
